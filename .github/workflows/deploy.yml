name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; never cancel an in-flight deployment (canceling mid-publish
# leaves Pages half-deployed and makes the next run fail "Deployment failed, try again later").
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site (repo root, incl. CNAME)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      # actions/deploy-pages intermittently returns "Deployment failed, try again later"
      # (a transient GitHub Pages hiccup). Retry up to 3x so one bad roll doesn't fail the run.
      - name: Deploy (attempt 1)
        id: dep1
        uses: actions/deploy-pages@v4
        timeout-minutes: 10
        continue-on-error: true
      - name: Cool off
        if: steps.dep1.outcome == 'failure'
        run: sleep 25
      - name: Deploy (attempt 2)
        id: dep2
        if: steps.dep1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        timeout-minutes: 10
        continue-on-error: true
      - name: Cool off more
        if: steps.dep1.outcome == 'failure' && steps.dep2.outcome == 'failure'
        run: sleep 40
      - name: Deploy (final attempt)
        if: steps.dep1.outcome == 'failure' && steps.dep2.outcome == 'failure'
        uses: actions/deploy-pages@v4
        timeout-minutes: 10
